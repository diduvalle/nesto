<style>
:root{
  /* Família "greige" — Pedra (default). Neutros quentes; acento aplicado por JS (applyPalette). */
  --bg:#1f1f20; --bg2:#262524; --card:#2c2a28; --card2:#37342f; --line:#423e39; --line2:#57524b;
  --txt:#f6f4f1; --mut:#a59f99; --acc:#b7a99b; --accd:#a59f99;
  --in:#93b196; --out:#cd8f7e; --warn:#d3b277; --info:#93a9b8;
  --acc-10:rgba(183,169,155,.10); --acc-12:rgba(183,169,155,.12); --acc-15:rgba(183,169,155,.15); --acc-16:rgba(183,169,155,.16);
  --pri:#f1ede7; --pri-fg:#1f1f20;        /* botão primário invertido (chique/minimal) */
  --r:18px; --r-sm:12px; --r-lg:24px;
  --sh-sm:0 1px 2px rgba(0,0,0,.22);
  --sh:0 1px 2px rgba(0,0,0,.18),0 14px 34px -16px rgba(0,0,0,.6);
  --sh-lg:0 24px 60px -16px rgba(0,0,0,.62);
  --hair:rgba(255,255,255,.045);
}
/* tema claro: só tokens dependentes do tema (cores da paleta vêm do applyPalette) */
[data-theme="light"]{
  --pri:#26241f; --pri-fg:#f6f4f1;
  --sh-sm:0 1px 2px rgba(60,52,42,.07);
  --sh:0 1px 2px rgba(60,52,42,.05),0 14px 30px -16px rgba(60,52,42,.16);
  --sh-lg:0 24px 56px -16px rgba(60,52,42,.20);
  --hair:rgba(255,255,255,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14.5px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-.011em}
.app{display:flex;min-height:100vh}
/* ===== Sidebar (PC) ===== */
.sidebar{width:234px;flex:none;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 14px;position:sticky;top:0;height:100vh;gap:4px}
.side-brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:18px;letter-spacing:-.02em;padding:8px 8px 18px}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6b635a,#37342f);display:grid;place-items:center;color:#f6f4f1;flex:none;overflow:hidden;box-shadow:var(--sh-sm)}
.logo svg{width:20px;height:20px}
.logo img{width:100%;height:100%;object-fit:cover}
.sidenav{display:flex;flex-direction:column;gap:3px}
.sidenav button{display:flex;align-items:center;gap:12px;padding:10px 12px;border:0;background:none;color:var(--mut);border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;width:100%;text-align:left;position:relative;transition:background .15s,color .15s}
.sidenav button:hover{background:var(--card);color:var(--txt)}
.sidenav button.on{background:var(--acc-12);color:var(--acc)}
.sidenav button.on::before{content:'';position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
.sidenav button svg{width:19px;height:19px;flex:none}
.side-bottom{margin-top:auto;display:flex;flex-direction:column;gap:9px;padding:10px 4px 6px}
.side-saldo{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;cursor:pointer;transition:border-color .14s,transform .1s;box-shadow:var(--sh-sm)}
.side-saldo:hover{border-color:var(--acc);transform:translateY(-1px)}
.side-saldo .ss-l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.side-saldo .ss-v{font-size:19px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-top:1px}
.side-add{justify-content:center;font-size:14px;padding:11px}
.side-foot{padding:12px 10px 2px;font-size:11px;color:var(--mut);border-top:1px solid var(--line);display:flex;flex-direction:column;align-items:flex-start;gap:5px}
.foot-nest{display:inline-grid;place-items:center;width:16px;height:16px;color:var(--mut);flex:none}
.foot-nest svg{width:14px;height:14px}
/* FAB (telemóvel) */
.fab{display:none;position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:55;width:56px;height:56px;border-radius:50%;border:0;background:var(--pri);color:var(--pri-fg);font-size:30px;font-weight:400;line-height:1;cursor:pointer;box-shadow:var(--sh-lg),0 6px 18px -4px rgba(0,0,0,.4);transition:transform .12s}
.fab:active{transform:scale(.92)}
@media(max-width:860px){.fab{display:grid;place-items:center}}
/* pull-to-refresh (telemóvel) */
#ptr{position:fixed;top:6px;left:50%;transform:translateX(-50%) translateY(-46px);z-index:45;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh);display:grid;place-items:center;opacity:0;pointer-events:none;color:var(--mut)}
#ptr svg{width:18px;height:18px}
#ptr.ready{color:var(--acc)}
#ptr.spin{color:var(--acc)}
#ptr.spin svg{animation:spin .8s linear infinite}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
/* ===== Topbar (slim) ===== */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 22px;background:color-mix(in srgb,var(--bg2) 82%,transparent);backdrop-filter:saturate(1.4) blur(10px);-webkit-backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;min-height:60px}
.topbar-title{font-weight:800;font-size:17px;letter-spacing:-.02em}
.mobile-brand{display:none;align-items:center;gap:9px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
.spacer{flex:1}
.yearnav{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
.yearnav button{background:none;border:0;color:var(--mut);cursor:pointer;width:30px;height:28px;border-radius:6px;font-size:16px}
.yearnav button:hover{background:var(--card2);color:var(--txt)}
.yearnav .y{font-weight:800;font-size:15px;min-width:54px;text-align:center}
.btn{background:var(--card2);color:var(--txt);border:1px solid transparent;padding:9px 15px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:background .16s,color .16s,transform .1s,box-shadow .16s;box-shadow:var(--sh-sm)}
.btn:hover{background:color-mix(in srgb,var(--card2) 82%,var(--acc));transform:translateY(-1px);box-shadow:var(--sh)}
.btn:active{transform:translateY(0);box-shadow:var(--sh-sm)}
.btn svg{width:15px;height:15px;color:var(--acc);transition:color .16s}
.btn.primary{background:var(--pri);border:0;color:var(--pri-fg);font-weight:700}
.btn.primary svg{color:var(--pri-fg)}
.btn.primary:hover{background:var(--pri);filter:brightness(1.08);transform:translateY(-1px);box-shadow:var(--sh)}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn.danger{color:var(--out)}.btn.danger svg{color:var(--out)}
.btn.danger:hover{background:color-mix(in srgb,var(--card2) 80%,var(--out));color:var(--out)}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:3px;box-shadow:var(--sh-sm)}
.seg button{background:none;border:0;color:var(--mut);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:700;border-radius:9px;transition:background .16s,color .16s,box-shadow .16s}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--card);color:var(--acc);box-shadow:var(--sh-sm)}
.seg button.on-out{background:var(--card);color:var(--out);box-shadow:var(--sh-sm)}
.seg button.on-in{background:var(--card);color:var(--in);box-shadow:var(--sh-sm)}
button{font-family:inherit;letter-spacing:inherit}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--bg2);color:var(--txt);border:1px solid transparent;border-radius:11px;padding:10px 12px;outline:none;box-shadow:inset 0 0 0 1px var(--line);transition:box-shadow .16s}
input:focus,select:focus,textarea:focus{box-shadow:inset 0 0 0 1px var(--acc),0 0 0 3px var(--acc-12)}
input::placeholder,textarea::placeholder{color:var(--mut);opacity:.7}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#bell{background:none;border:0;color:var(--mut);cursor:pointer;position:relative;padding:6px;border-radius:9px;display:inline-flex}
#bell:hover{color:var(--txt);background:var(--card)}
#bell svg{width:19px;height:19px;display:block}
#refreshBtn,#searchBtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:6px;border-radius:9px;display:inline-flex}
#refreshBtn:hover,#searchBtn:hover{color:var(--txt);background:var(--card)}
#refreshBtn svg,#searchBtn svg{width:18px;height:18px;display:block}
#refreshBtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bell-badge{position:absolute;top:-1px;right:-1px;background:var(--out);color:#fff;font-size:10px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
.main{padding:22px 24px 92px;flex:1;width:100%;max-width:1200px;margin:0 auto}
/* KPI strip */
.kstrip{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.kbox{background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);padding:13px 17px;flex:1;min-width:158px;box-shadow:var(--sh)}
.kbox .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kbox .v{font-size:23px;font-weight:800;letter-spacing:-.6px;margin-top:3px;font-variant-numeric:tabular-nums}
.pos{color:var(--in)} .neg{color:var(--out)}
/* Insights */
.ins-list{display:flex;flex-direction:column}
.ins{display:flex;gap:11px;align-items:center;padding:10px 2px;border-bottom:1px solid color-mix(in srgb,var(--line) 55%,transparent)}
.ins:last-child{border-bottom:0}
.ins-ic{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:none;background:var(--acc-12);font-size:16px;line-height:1}
.ins-tx{font-size:13.5px;line-height:1.4;color:var(--mut)}
.ins-tx b{color:var(--txt);font-weight:700}
.top-range{display:flex;align-items:center;gap:8px;margin:2px 0 14px;flex-wrap:wrap}
.top-range input{padding:7px 10px;font-size:13px;width:auto}
/* info tooltip (texto de ajuda em ícone — balão fixo, nunca cortado pela box) */
.info-i{width:18px;height:18px;border-radius:50%;border:0;background:var(--card2);color:var(--mut);font-size:11px;font-weight:800;font-style:italic;cursor:help;display:inline-grid;place-items:center;padding:0;line-height:1;box-shadow:inset 0 0 0 1px var(--line);vertical-align:middle;flex:none;transition:color .14s,background .14s}
.info-i:hover{color:var(--acc);background:var(--card)}
.dh>span{flex:1;min-width:0}
.tip{position:fixed;z-index:10001;max-width:264px;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:12.5px;line-height:1.45;box-shadow:var(--sh-lg);opacity:0;pointer-events:none;transition:opacity .12s,transform .12s;transform:translateY(3px)}
.tip.on{opacity:1;transform:none}
/* ícone de categoria (chip) + seletor */
.cicon{display:inline-grid;place-items:center;border-radius:8px;flex:none;cursor:pointer;transition:transform .1s}
.cicon.dotcol{border-radius:5px}
.cicon svg{width:62%;height:62%}
button.cicon:hover{transform:scale(1.08)}
.iconpick{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:560px){.iconpick{grid-template-columns:repeat(6,1fr)}}
.iconpick button{aspect-ratio:1;border:1px solid var(--line);background:var(--bg2);border-radius:11px;display:grid;place-items:center;cursor:pointer;color:var(--mut);transition:background .12s,color .12s,border-color .12s}
.iconpick button:hover{background:var(--card);color:var(--acc)}
.iconpick button.on{border-color:var(--acc);background:var(--acc-12);color:var(--acc)}
.iconpick button svg{width:20px;height:20px}
.ob-cloud{background:var(--bg2);border-radius:12px;padding:13px;box-shadow:inset 0 0 0 1px var(--line)}
.ob-cloud.ok{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cloud-h{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px}
.cloud-h svg{width:15px;height:15px;color:var(--acc)}
.cloud-or{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:10.5px;margin:13px 0;text-transform:uppercase;letter-spacing:.6px}
.cloud-or::before,.cloud-or::after{content:'';height:1px;background:var(--line);flex:1}
.ob-note{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border-radius:11px;padding:10px 12px;box-shadow:inset 0 0 0 1px var(--line);font-size:12.5px;color:var(--mut);line-height:1.55}
.ob-note .nb{flex:none;width:18px;height:18px;border-radius:50%;background:var(--warn);color:#2c2a28;font-weight:800;font-size:12px;display:grid;place-items:center;margin-top:1px}
.prov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prov-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer;text-align:left;transition:border-color .14s,background .14s,transform .12s}
.prov-btn b{font-size:12.5px;color:var(--txt)}
.prov-btn span{font-size:10.5px;color:var(--mut);line-height:1.3}
.prov-btn:hover{border-color:var(--line2);transform:translateY(-1px)}
.prov-btn.on{border-color:var(--acc);background:var(--acc-12)}
.prov-btn.dim{opacity:.45}
.prov-btn.dim:hover{opacity:.75}
.prov-flow{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.prov-steps{font-size:12.5px;color:var(--mut);margin:0 0 10px 18px;padding:0;line-height:1.6}
.bk-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.bk-row:last-child{border-bottom:0}
.empty-tile{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--accd),var(--card2));display:grid;place-items:center;color:var(--txt);margin:0 auto 12px}
/* barra da Grelha: controlos (segmentos) numa linha, ações numa faixa deslizável no telemóvel */
.grid-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:9px}
.grid-actions{display:flex;gap:8px;align-items:center;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding:2px}
.grid-actions::-webkit-scrollbar{display:none}
.grid-actions .btn{flex:none;white-space:nowrap}
@media(max-width:480px){ .grid-controls{gap:6px} .grid-controls .seg button{padding:7px 10px;font-size:12.5px} }
/* vista Lista da Grelha (um cartão por mês, colapsável — pensada para o telemóvel) */
.gm{display:flex;flex-direction:column;gap:9px}
.gm-month{background:var(--card);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;position:relative}
.gm-month.now{box-shadow:inset 3px 0 0 var(--acc),var(--sh-sm)}
.gm-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:13px 15px;cursor:pointer;font-size:14px;color:var(--txt)}
.gm-nm{font-weight:800;min-width:92px;text-align:left;flex:none}
.gm-month.now .gm-nm{color:var(--acc)}
.gm-lock{font-size:11px;opacity:.7;width:16px;flex:none;text-align:left}
.gm-tot{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.gm-tot.neg{color:var(--out)} .gm-tot.pos{color:var(--in)}
.gm-tot.mut{color:var(--mut);opacity:.45;font-weight:500}
.gm-chev{color:var(--mut);font-size:11px;width:12px;flex:none}
.gm-body{border-top:1px solid var(--line);padding:5px 7px 8px}
.gm-cat{display:flex;align-items:center;gap:9px;padding:9px;border-radius:10px;cursor:pointer;transition:background .12s}
.gm-cat:hover{background:var(--acc-12)}
.gm-cat .cicon{flex:none}
.gm-cat.sub .cicon{opacity:.85}
.gm-cnm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.gm-cv{font-weight:600;font-variant-numeric:tabular-nums;font-size:13.5px}
.gm-cat.z .gm-cv,.gm-cat.z .gm-cnm{opacity:.45}
.gm-cat.warn .gm-cv{color:var(--warn)} .gm-cat.over .gm-cv{color:var(--out)}
.gm-cat.sub{padding-left:30px;background:var(--bg2);border-radius:8px;margin:1px 0}
.gm-cat.sub .gm-cnm,.gm-cat.sub .gm-cv{font-size:12.5px;color:var(--mut)}
.gm-tog{border:0;background:var(--card2);color:var(--mut);cursor:pointer;padding:3px 8px;border-radius:7px;font-size:11px;flex:none}
.gm-tog:hover{color:var(--acc)}
.gm-foot{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:var(--card2);border-radius:var(--r);font-size:13px}
.pin-wrap{position:relative;display:block}
.pin-wrap input{width:100%;padding-right:42px}
.eye-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:0;background:none;color:var(--mut);cursor:pointer;display:grid;place-items:center;border-radius:9px;padding:0;transition:color .14s}
.eye-btn:hover{color:var(--acc)}
.eye-btn svg{width:17px;height:17px}
.made-by{display:inline-flex;align-items:center;gap:6px;color:var(--mut);font-size:11px;text-decoration:none;transition:color .15s}
.made-by:hover{color:var(--acc)}
.made-by svg{width:13px;height:13px;flex:none}
/* compreender a fatura */
.fg-details>summary{cursor:pointer;font-size:13px;font-weight:700;color:var(--acc);display:flex;align-items:center;gap:7px;list-style:none}
.fg-details>summary::-webkit-details-marker{display:none}
.fg-details>summary svg{width:15px;height:15px}
.fglist{display:flex;flex-direction:column;gap:9px}
.fg-it{background:var(--bg2);border-radius:11px;padding:10px 12px;box-shadow:inset 0 0 0 1px var(--line)}
.fg-h{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.fg-l{font-weight:700;font-size:13px}
.fg-v{font-weight:800;font-variant-numeric:tabular-nums;flex:none}
.fg-e{font-size:12px;color:var(--mut);line-height:1.4;margin-top:3px}
.fmlist{display:flex;flex-direction:column;margin-bottom:4px}
.fmrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid color-mix(in srgb,var(--line) 55%,transparent)}
.fmrow:last-child{border-bottom:0}
.fmh{flex:1;min-width:0;font-size:13px}
.fmrow code{font-size:11px;background:var(--bg2);padding:1px 6px;border-radius:5px}
.rp-list{display:flex;flex-direction:column;gap:11px}
.rp-row{display:flex;flex-direction:column;gap:5px}
.rp-top{display:flex;align-items:center;gap:8px;font-size:13px}
.rp-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp-v{font-weight:700;font-variant-numeric:tabular-nums}
/* Orçamentos */
.orc-list{display:flex;flex-direction:column;gap:13px}
.orc-row{display:flex;flex-direction:column;gap:5px}
.orc-top{display:flex;align-items:center;gap:8px;font-size:13px}
.orc-nm{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.orc-val{font-weight:700;font-variant-numeric:tabular-nums}
.orc-bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)}
.orc-fill{display:block;height:100%;border-radius:6px;background:var(--acc);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.orc-fill.warn{background:var(--warn)}
.orc-fill.over{background:var(--out)}
.orc-meta{font-size:11.5px;color:var(--mut)}
/* Metas de poupança */
.meta-card{display:flex;gap:14px;align-items:center}
.meta-ring{flex:none}
.meta-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.meta-nm{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px}
.meta-amt{font-size:13px;color:var(--mut)}
.meta-amt b{font-size:17px;color:var(--txt);font-weight:800}
.meta-sub{font-size:12px;color:var(--mut);margin-bottom:5px}
.metacols{display:flex;gap:8px;flex-wrap:wrap}
.metacol{width:28px;height:28px;border-radius:9px;border:2px solid transparent;cursor:pointer;padding:0;box-shadow:var(--sh-sm);transition:transform .1s}
.metacol:hover{transform:scale(1.08)}
.metacol.on{border-color:var(--txt);box-shadow:0 0 0 3px var(--acc-12)}
input[type=color]{width:46px;height:36px;padding:3px;border-radius:10px;cursor:pointer;background:var(--bg2);box-shadow:inset 0 0 0 1px var(--line);flex:none}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:7px}
/* Contas de poupança */
.acc-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.acc-nm{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-badge{font-size:11px;font-weight:600;color:var(--mut);background:var(--bg2);border-radius:8px;padding:3px 9px;flex:none;box-shadow:inset 0 0 0 1px var(--line)}
.acc-val{font-size:24px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;cursor:pointer}
.acc-yield{font-size:12px;color:var(--mut);margin-top:3px;display:flex;align-items:center;gap:5px}
.acc-yield svg{width:13px;height:13px;color:var(--in)}
.acc-yield b{font-weight:700}
.acc-card .dvactions{margin-top:11px}
/* Quick add */
.qadd{display:flex;gap:11px;align-items:flex-end;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 90%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r-lg);padding:17px 19px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--sh)}
.qadd .fld{display:flex;flex-direction:column}
.qadd label{font-size:11px;letter-spacing:.3px;text-transform:uppercase}
.qadd input,.qadd select{padding:11px 13px;background:var(--bg2);border-color:transparent;box-shadow:inset 0 0 0 1px var(--line)}
.qadd input:focus,.qadd select:focus{border-color:transparent;box-shadow:inset 0 0 0 1px var(--acc),0 0 0 3px var(--acc-12)}
.qadd .v{width:128px;font-weight:800;font-size:18px}
.qadd #qAdd,.qadd #qAddCash{height:44px}
.qadd #qAdd{padding:0 22px;border-radius:12px}
/* Grid */
.gridwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:auto;box-shadow:var(--sh)}
table.grid{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.grid th,table.grid td{border-bottom:1px solid color-mix(in srgb,var(--line) 60%,transparent);padding:0;text-align:right;white-space:nowrap}
table.grid tbody tr:last-child th,table.grid tbody tr:last-child td{border-bottom:0}
table.grid thead th{position:sticky;top:0;background:linear-gradient(180deg,var(--card2),color-mix(in srgb,var(--card2) 86%,var(--bg)));z-index:2;font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:12px 14px;cursor:default}
table.grid thead th .delcol{opacity:0;color:var(--mut);cursor:pointer;margin-left:6px;font-weight:400}
table.grid thead th:hover .delcol{opacity:.6}
table.grid thead th .delcol:hover{opacity:1;color:var(--out)}
table.grid tbody th,table.grid tfoot th{position:sticky;left:0;background:var(--card);z-index:1;text-align:left;font-weight:700;padding:11px 14px;font-size:13px;color:var(--txt);box-shadow:7px 0 9px -8px rgba(0,0,0,.10)}
table.grid td.cell{padding:11px 14px;cursor:pointer;font-size:13.5px;min-width:92px;transition:background .1s}
table.grid td.cell:hover{background:var(--acc-12);box-shadow:inset 0 0 0 1.5px var(--acc);border-radius:9px}
table.grid td.cell.z{color:var(--mut);font-weight:400;opacity:.4}
table.grid td.tot,table.grid th.tot{background:var(--card2);font-weight:800;position:sticky;right:0;box-shadow:-8px 0 10px -8px rgba(0,0,0,.14)}
table.grid tfoot th,table.grid tfoot td{position:sticky;bottom:0;background:var(--card2);font-weight:800;border-top:1.5px solid var(--line2);z-index:1;padding:11px 13px}
table.grid tr.now td.cell{background:var(--acc-12)}
table.grid tr.now th{color:var(--acc);background:var(--card)}
table.grid tr.now th::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
.addcol-th{cursor:pointer;color:var(--acc)!important}
table.grid th.subcol,table.grid td.subcol{background:var(--bg2)}
table.grid td.subcell{background:var(--bg2);font-size:12.5px;color:var(--mut)}
table.grid td.subcell:hover{background:var(--acc-12);color:var(--txt)}
table.grid td.cell.over{color:var(--out)!important;font-weight:800;background:color-mix(in srgb,var(--out) 14%,transparent)}
table.grid td.cell.warn{color:var(--warn)!important;font-weight:700}
table.grid td.cell.pend{opacity:.5;font-style:italic}
table.grid thead th.subcol{font-weight:600;font-size:10.5px}
.exptog{color:var(--mut);font-size:13px;width:15px;display:inline-grid;place-items:center;border-radius:4px;font-weight:700}
table.grid th.thtog{cursor:pointer;user-select:none}
table.grid th.thtog:hover{background:var(--acc-12)}
table.grid th.thtog:hover .exptog{color:var(--acc)}
table.grid thead th[data-cat]{cursor:grab}
table.grid thead th.th-drop{outline:2px dashed var(--acc);outline-offset:-2px;background:var(--acc-16)!important}
table.grid thead th.th-before{box-shadow:inset 4px 0 0 var(--acc)}
.thedit{background:none;border:0;color:var(--mut);cursor:pointer;padding:1px;border-radius:4px;opacity:.35;display:inline-flex;margin-left:2px}
.thedit svg{width:13px;height:13px}
table.grid thead th:hover .thedit{opacity:.7}
.thedit:hover{opacity:1!important;color:var(--acc)}
.pinp{background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;width:100%;font-size:13.5px}
.pinp:hover{border-color:var(--line)}
.pinp:focus{border-color:var(--acc);background:var(--card2)}
.pinp.pnum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;max-width:160px}
.poupval{cursor:pointer;font-weight:700;font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line);padding-bottom:1px}
.poupval:hover{border-color:var(--acc);color:var(--acc)}
.defs-grid{column-count:2;column-gap:14px;max-width:1120px}
.defs-grid .span2{column-span:all}
.defs-grid>.card{min-width:0;break-inside:avoid;margin:0 0 14px}
.defs-grid>.span2{margin-top:0}
.defgroup{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--bg2);overflow:hidden}
.defgroup>summary{cursor:pointer;list-style:none;padding:14px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.defgroup>summary::-webkit-details-marker{display:none}
.defgroup>summary::before{content:'▸';color:var(--mut);font-size:12px}
.defgroup[open]>summary::before{content:'▾'}
.defgroup[open]>summary{border-bottom:1px solid var(--line)}
.defgroup .defs-grid{padding:14px}
.setgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 24px}
.setf>label{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.setf.wide{grid-column:1/-1}
.setrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
@media(max-width:640px){.setgrid{grid-template-columns:1fr}}
.cols-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.twocol{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px}
.cols-2>*,.twocol>*{min-width:0}
@media(max-width:720px){.cols-2,.twocol{grid-template-columns:1fr;gap:12px}}
.dh{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin:0 0 12px}
.dh svg{width:17px;height:17px;color:var(--acc);flex:none}
.dsub{color:var(--mut);font-size:12px;margin:-7px 0 12px;line-height:1.35}
@media(max-width:780px){.defs-grid{column-count:1}}
/* tamanho seguro p/ todos os ícones SVG (evita ícones gigantes em h2/cartões) */
svg{width:16px;height:16px;flex:none}
h2 svg{width:18px;height:18px;vertical-align:middle}
.modal h2 svg{width:19px;height:19px}
/* Resumo anual */
.sumtable{width:100%;border-collapse:collapse;margin-top:0}
.sumtable th,.sumtable td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.sumtable th:first-child,.sumtable td:first-child{text-align:left}
.sumtable thead th{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.sumtable tfoot td{font-weight:800;border-top:2px solid var(--line2)}
.sumtable tr.now td{background:rgba(56,189,248,.07)}
.section-h{font-size:13px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:18px 4px 8px}
/* Popover */
.pop{position:fixed;z-index:80;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--sh-lg);width:290px;display:none}
.pop.on{display:block;animation:pp .12s}
@keyframes pp{from{opacity:0;transform:translateY(-4px)}}
.pop .ph{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.pop .ph .dot{width:9px;height:9px;border-radius:50%}
.pop .pb{padding:12px 14px}
.pop .padd{display:flex;gap:7px;margin-bottom:10px}
.pop .padd input{width:100%;font-size:15px;font-weight:700}
.pop .padd button{flex:none;padding:8px 12px}
.plist{max-height:180px;overflow:auto;display:grid;gap:5px}
.pe{display:flex;align-items:center;gap:8px;font-size:12.5px;background:var(--card2);border-radius:7px;padding:6px 9px}
.pe .x{margin-left:auto;cursor:pointer;color:var(--mut);background:none;border:0;font-size:13px;line-height:1;padding:2px 4px;border-radius:5px}
.pe .x:hover{color:var(--out);background:var(--card)}
.pop .popt{display:flex;gap:6px;margin-bottom:9px}
.pop .popt select{flex:1;padding:6px 8px;font-size:12px}
.pempty{color:var(--mut);font-size:12px;text-align:center;padding:8px}
/* Modal */
.back{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow:auto;padding:50px 16px}
.back.on{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);width:100%;max-width:520px;box-shadow:var(--sh-lg);overflow:hidden}
.modal h2{font-size:17px;font-weight:800;letter-spacing:-.3px;padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.modal .body{padding:20px 22px;display:grid;gap:14px}
.modal .foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.f2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}
.f2>div{min-width:0}
.close{margin-left:auto;background:none;border:0;color:var(--mut);cursor:pointer;font-size:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.card,.dcard,.kbox,.dvcard{position:relative}
.card::after,.dcard::after,.kbox::after,.dvcard::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.toast{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--acc);padding:12px 18px;border-radius:13px;box-shadow:var(--sh-lg);z-index:300;font-weight:600;font-size:13px;display:none}
.toast.on{display:block;animation:pp .2s}
.hint{font-size:12.5px;color:var(--mut);background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--info);border-radius:12px;padding:11px 13px;line-height:1.45}
.splitseg{display:flex;gap:6px;flex-wrap:wrap}
.splitseg button{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12px;font-weight:600;cursor:pointer}
.splitseg button.on{border-color:var(--acc);background:var(--acc-12);color:var(--acc)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:0 13px;height:36px;font-size:12.5px;font-weight:600;box-sizing:border-box;box-shadow:var(--sh-sm)}
.chip.warn{border-color:var(--out);color:var(--out)}
.chip.warn svg{width:14px;height:14px}
#valeteHead{display:inline-flex;align-items:center;gap:6px}
.topbar #refreshBtn,.topbar #bell,.topbar #lockNow,.topbar #searchBtn{height:34px;width:34px;padding:0;align-items:center;justify-content:center}
#lockNow{background:none;border:0;color:var(--mut);cursor:pointer;border-radius:9px;display:inline-flex}
#lockNow:hover{color:var(--out);background:var(--card)}
#lockNow svg{width:18px;height:18px;display:block}
.topbar .yearnav{height:34px}
.catedit{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.catedit .dot{width:13px;height:13px;border-radius:4px;flex:none}
.catedit input{flex:1}
.catcount{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:1px 8px;font-size:11.5px;font-weight:700;cursor:pointer}
.catcount:hover{border-color:var(--acc);color:var(--acc)}
.iconbtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:5px;border-radius:6px}
.iconbtn:hover{color:var(--acc);background:var(--card2)}
.iconbtn svg{width:16px;height:16px;display:block}
.foot-credit{text-align:center;color:var(--mut);font-size:11.5px;padding:20px}
@media(max-width:860px){
  .sidebar{display:none}
  .mobile-brand{display:flex}
}
@media(max-width:720px){
  .main{padding:14px 12px 90px}
  .topbar{gap:8px;padding:10px 14px;min-height:56px}
  .topbar-title{font-size:16px}
  .qadd{gap:6px}.qadd .v{width:90px}
  .qadd .fld{flex:1 1 calc(50% - 6px)}
  .kstrip{gap:10px}
  .kbox{min-width:calc(50% - 7px);padding:11px 13px}.kbox .v{font-size:19px}
  .brand small{display:none}
  .f2{grid-template-columns:1fr}
}
@media(max-width:560px){ #valeteHead{display:none} .topbar #topright .yearnav{height:32px} }
/* ===== Dashboard (Resumo) ===== */
.view-in{animation:viewIn .3s cubic-bezier(.2,.7,.2,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.dash-greet{margin-bottom:16px}
.greet-hi{font-size:21px;font-weight:800;letter-spacing:-.4px}
.greet-sub{font-size:13px;color:var(--mut);margin-top:1px}
.dash .kstrip{margin-bottom:16px}
.kbox.k-accent{position:relative;overflow:hidden}
.kbox.k-accent::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc)}
.kbox.k-in::before{background:var(--in)}
.kbox.k-out::before{background:var(--out)}
.kbox.k-info::before{background:var(--info)}
.kbox.k-warn::before{background:var(--warn)}
.kbox{transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease}
.dash .kbox:hover{transform:translateY(-2px);border-color:var(--line2)}
.dash .kbox[data-reorder]{cursor:default}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease}
.dcard:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--line2)}
.dcard h3{font-size:13px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.dcard h3 svg{width:16px;height:16px;color:var(--acc);flex:none}
.dcard h3 .more{margin-left:auto;font-size:11.5px;color:var(--mut);font-weight:600;text-transform:none;letter-spacing:0}
.deb-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.deb-row:last-child{border-bottom:0}
.deb-row .dot{width:9px;height:9px;border-radius:50%;flex:none}
.deb-day{font-size:11px;color:var(--mut);background:var(--card2);border-radius:6px;padding:2px 7px;font-weight:700;min-width:50px;text-align:center;flex:none}
.tcat{display:flex;align-items:center;gap:9px;margin:7px 0}
.tcat .nm{width:96px;font-size:12.5px;color:var(--mut);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none}
.tcat .bar{flex:1;background:var(--card2);border-radius:6px;height:16px;overflow:hidden}
.tcat .bar>div{height:100%;border-radius:6px;animation:barGrow .5s ease}
@keyframes barGrow{from{width:0}}
.tcat .val{width:74px;font-size:12.5px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut{flex:none;display:grid;place-items:center}
.donut-leg{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.leg-row .dot{width:9px;height:9px;border-radius:3px;flex:none}
.leg-nm{flex:1;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg-v{font-weight:700;font-variant-numeric:tabular-nums;flex:none}
.leg-row.click{cursor:pointer;border-radius:8px;margin:0 -6px;padding:3px 6px;transition:background .12s}
.leg-row.click:hover{background:var(--card2)}
.leg-chev{color:var(--mut);font-weight:700;flex:none;opacity:.5}
.leg-row.click:hover .leg-chev{opacity:1;color:var(--acc)}
@media(max-width:420px){.donut-wrap{flex-direction:column;align-items:stretch}.donut{margin:0 auto}}
/* ações rápidas (circulares, estilo app) */
.qacts{display:flex;gap:10px;margin-bottom:16px}
.qact{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 6px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--sh-sm);transition:transform .12s,border-color .12s,box-shadow .12s;color:var(--txt)}
.qact:hover{transform:translateY(-2px);border-color:var(--line2);box-shadow:var(--sh)}
.qact:active{transform:translateY(0)}
.qa-ic{width:44px;height:44px;border-radius:50%;background:var(--card2);display:grid;place-items:center;color:var(--txt)}
.qa-ic svg{width:20px;height:20px}
.qa-ic.in{background:color-mix(in srgb,var(--in) 20%,var(--card2));color:var(--in)}
.qa-ic.out{background:color-mix(in srgb,var(--out) 20%,var(--card2));color:var(--out)}
.qa-lb{font-size:12px;font-weight:600;color:var(--mut)}
/* segmented mini (no header do fluxo) */
.dcard h3 .seg-mini{margin-left:auto;display:inline-flex;background:var(--card2);border-radius:9px;padding:2px;gap:2px;text-transform:none;letter-spacing:0}
.seg-mini button{border:0;background:none;color:var(--mut);font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;cursor:pointer}
.seg-mini button.on{background:var(--card);color:var(--txt);box-shadow:var(--sh-sm)}
/* últimas transações (com avatar) */
.tx-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line)}
.tx-row:last-child{border-bottom:0}
.tx-av{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;text-shadow:0 1px 2px rgba(0,0,0,.28)}
.tx-mid{flex:1;min-width:0;display:flex;flex-direction:column}

.chip svg{width:15px;height:15px}
.dempty{color:var(--mut);font-size:12.5px;text-align:center;padding:16px 8px;line-height:1.5}
/* hero "saldo real" */
.hero{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:16px;cursor:pointer;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .16s,box-shadow .16s}

.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--acc-16),transparent 70%);pointer-events:none}

.hero-v{font-size:42px;font-weight:900;letter-spacing:-1.6px;margin-top:6px;font-variant-numeric:tabular-nums;line-height:1}
.hero-sub{font-size:12.5px;color:var(--mut);margin-top:8px}
/* grelha reordenável de cartões */
.dash-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.dgrid-item.span2{grid-column:1/-1}
.dgrid-item{position:relative}
.dgrid-item.dragging{opacity:.4}
.dgrid-item.dg-over,.kbox.dg-over{outline:2px solid var(--acc);outline-offset:3px;box-shadow:0 0 0 4px var(--acc-12)}

.dg-grip svg{width:15px;height:15px}
.dgrid-item:hover .dg-grip,.kbox:hover .dg-grip{opacity:.45}
.dg-grip:hover{opacity:1!important;color:var(--acc)}
.kbox .dg-grip{top:9px;right:10px}
@media(hover:none){.dg-grip{display:none}}
.dgrid-tools{position:absolute;top:10px;right:12px;display:flex;gap:5px;align-items:center;z-index:4;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:var(--sh)}
.dg-mv{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--card2);color:var(--txt);cursor:pointer;font-size:12px;line-height:1;display:grid;place-items:center}
.dg-mv:disabled{opacity:.3;cursor:default}
.dg-mv:active:not(:disabled){background:var(--acc-16)}
.dg-mv.dg-done{background:var(--acc-12);color:var(--acc);border-color:var(--acc)}

.dvgrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}

.dvcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease}

.dvbar>div{height:100%;border-radius:5px;animation:barGrow .5s ease}
.dvmeta{font-size:11.5px;color:var(--mut);margin-bottom:11px}

.dvtag{font-size:10px;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:1px 7px;font-weight:700;white-space:nowrap}

.dvchk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt);font-weight:600;cursor:pointer}
.dvchk input{width:16px;height:16px}
/* ===== Paletas / logótipo / onboarding ===== */
.palrow{display:flex;flex-wrap:wrap;gap:8px}
.palsw{display:flex;flex-direction:column;align-items:stretch;gap:7px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:8px 8px 7px;cursor:pointer;min-width:80px;flex:1;position:relative;transition:border-color .14s,transform .12s,background .14s;box-shadow:var(--sh-sm)}
.palsw:hover{transform:translateY(-2px);border-color:var(--line2)}
.palsw.on{border-color:var(--acc);background:var(--acc-12)}
.palsw.on::after{content:'✓';position:absolute;top:4px;right:8px;font-size:10px;font-weight:800;color:var(--acc)}

.palsw-nm{font-size:11.5px;color:var(--mut);font-weight:700;text-align:center}
.palsw.on .palsw-nm{color:var(--acc)}
.logoprev{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accd),var(--card2));display:grid;place-items:center;color:#f6f4f1;flex:none;overflow:hidden;box-shadow:var(--sh-sm)}
.logoprev img{width:100%;height:100%;object-fit:cover}
.logoprev svg{width:27px;height:27px}

#onboard{animation:dashIn .3s ease}
.obbox{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--r-lg);max-width:400px;width:100%;box-shadow:var(--sh-lg);max-height:94vh;overflow:auto;position:relative}
.ob-hero{text-align:center;padding:32px 28px 16px;position:relative;overflow:hidden}

.ob-hero>*{position:relative}
.oblogo{width:66px;height:66px;border-radius:19px;background:linear-gradient(135deg,#6b635a,#37342f);display:grid;place-items:center;color:#f6f4f1;margin:0 auto 16px;box-shadow:var(--sh),0 0 0 6px var(--acc-10)}

.ob-hero h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin:0 0 7px;border:0;padding:0}

.ob-body{padding:8px 28px 4px}
.ob-field{margin-bottom:17px}

.ob-opt{color:var(--mut);font-weight:500;font-size:11px}

.ob-logo-row{display:flex;align-items:center;gap:12px}
.ob-done{width:calc(100% - 56px);margin:6px 28px 28px;justify-content:center;padding:14px;font-size:15px;border-radius:14px}

.ob-steps{display:flex;align-items:center;gap:6px;padding:2px 28px 16px}
.ob-step{display:flex;align-items:center;gap:7px;flex:1;color:var(--mut);font-size:11.5px;font-weight:600}
.ob-step .ob-stepn{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:var(--card2);color:var(--mut);box-shadow:inset 0 0 0 1px var(--line);flex:none;transition:all .18s}

.ob-step.done .ob-stepn{background:var(--acc);color:#fff;box-shadow:none}
.ob-step.on{color:var(--txt)}
.ob-step:not(:last-child)::after{content:'';height:2px;flex:1;background:var(--line);border-radius:2px}
.ob-step.done:not(:last-child)::after{background:var(--acc)}
.ob-stepbody{padding:2px 28px 6px;min-height:188px}
.ob-foot{display:flex;align-items:center;gap:10px;padding:12px 28px 26px}
.ob-foot .btn{padding:12px 18px}
.ob-foot .btn.primary{flex:1;justify-content:center;font-size:14.5px}
/* ===== Bottom navigation (telemóvel) ===== */
.botnav{display:none}
@media(max-width:860px){
  .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:color-mix(in srgb,var(--bg2) 90%,transparent);backdrop-filter:saturate(1.4) blur(12px);-webkit-backdrop-filter:saturate(1.4) blur(12px);border-top:1px solid var(--line);padding:6px 6px calc(6px + env(safe-area-inset-bottom));justify-content:space-around;box-shadow:0 -6px 24px -10px rgba(0,0,0,.4)}
  .botnav button{flex:1;background:none;border:0;color:var(--mut);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;cursor:pointer;font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent;transition:color .15s}
  .botnav button svg{width:22px;height:22px;transition:transform .18s}
  .botnav button.on{color:var(--acc)}
  .botnav button.on svg{transform:translateY(-2px) scale(1.06)}
  .botnav button.on::after{content:'';position:absolute;top:4px;width:5px;height:5px;border-radius:50%;background:var(--acc)}
  .botnav button{position:relative}
  .main{padding-bottom:84px}
}
/* ----- Splash de arranque: fundo greige + moedas a pingar que formam o ninho ----- */
#splash{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:#2c2a28 radial-gradient(circle at 40% 34%,#57524b,#2c2a28);transition:opacity .55s ease}
#splash.done{opacity:0;pointer-events:none}
#splash svg{width:112px;height:112px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.18));animation:splashPop 1.8s ease both}
#splash .house{fill:none;stroke:#f6f4f1;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1;animation:houseDraw 1.15s ease .5s forwards}
#splash .coin{fill:#f6f4f1;opacity:0;transform-box:fill-box;transform-origin:center;animation:coinDrop .9s cubic-bezier(.3,1.45,.5,1) forwards}
#splash .coin1{animation-delay:.05s}
#splash .coin2{animation-delay:.24s}
#splash .coin3{animation-delay:.43s}
@keyframes coinDrop{0%{opacity:0;transform:translateY(-17px) scale(.6)}30%{opacity:1}68%{transform:translateY(0) scale(1)}80%{transform:translateY(-1.2px) scaleY(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes houseDraw{to{stroke-dashoffset:0}}
@keyframes splashPop{0%{transform:scale(.86);opacity:.2}48%{opacity:1}70%{transform:scale(1.04)}100%{transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#splash .house{animation:none;stroke-dashoffset:0}#splash .coin{animation:none;opacity:1}#splash svg{animation:none}}
/* ----- Teclado de PIN do bloqueio ----- */
#lock .dots{display:flex;gap:13px;justify-content:center;height:14px;margin:2px 0}
#lock .dots span{width:12px;height:12px;border-radius:50%;border:2px solid var(--line2);transition:background .1s,border-color .1s}
#lock .dots span.on{background:var(--acc);border-color:var(--acc)}
#lock .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
#lock .pad button{aspect-ratio:1;border:0;border-radius:14px;background:var(--card2);color:var(--txt);font-size:25px;font-weight:600;cursor:pointer;transition:background .12s,transform .07s;-webkit-tap-highlight-color:transparent;user-select:none}
#lock .pad button:hover{background:var(--line)}
#lock .pad button:active{transform:scale(.93);background:var(--acc);color:#10160f}
#lock .pad button.k-back{background:transparent;color:var(--mut);font-size:22px}
#lock .pad button.k-back:active{background:transparent;transform:scale(.9)}
#lock .pad button.k-empty{visibility:hidden;pointer-events:none}
#lockBox.shake{animation:lockShake .42s}
@keyframes lockShake{0%,100%{transform:none}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

/* rede de segurança: se algo rebentar no arranque, mostra o erro (em vez de ecrã branco) + botão p/ limpar cache */
window.addEventListener('error',function(ev){
  try{
    var m=document.getElementById('main');
    if(m && m.innerHTML.length>50) return; // app já desenhou, não mexer
    document.body.innerHTML='<div style="padding:24px;font-family:system-ui,sans-serif;color:#e8edf4;background:#14171a;min-height:100vh">'
      +'<div style="font-size:34px;margin-bottom:8px">€</div>'

      +'<button id="_fix" style="padding:13px 16px;background:#b7a99b;border:0;color:#fff;border-radius:10px;font-weight:700;font-size:15px">Limpar cache e recarregar</button>'
      +'<pre style="white-space:pre-wrap;color:#6b7787;font-size:11px;margin-top:18px">'+((ev&&(ev.message||ev.error))||'')+'</pre></div>';

});

function saidasDinheiro(){const base=(state.poupancas[ultimoAnoPoup()]||{}).contagemData||0;return round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.cash&&m.ts&&m.ts>base).reduce((a,m)=>a+m.valor,0));}
function reverteValete(mv){if(!mv||!mv.vAdj)return;const p=state.poupancas[ultimoAnoPoup()];if(!p)return;const nm=(mv.vAdjConta||'');const c=(p.contas||[]).find(x=>(x.nome||'').trim().toLowerCase()===nm)||((nm==='coverflex'||nm==='cartão de benefícios')?coverflexConta():valeteConta());if(c)c.valor=round2((parseFloat(c.valor)||0)-mv.vAdj);}
/* DÉBITOS AGENDADOS (pendentes): faturas com débito futuro não abatem no Valete até chegar o dia.
   Ao abrir a app, os que já venceram (data<=hoje) tornam-se definitivos e abatem agora. */
function liquidarPendentes(){
  const hoje=isoToday(); let n=0,total=0;
  (state.movimentos||[]).forEach(m=>{ if(m.pendente && m.data<=hoje){ delete m.pendente; aplicaValete(m); n++; total=round2(total+Math.abs(m.valor)); } });
  if(n){ save(); if(isUnlocked()) toast(n+' débito(s) cobrado(s) hoje — saldo real atualizado ('+fmt(total)+')'); }
  return n;
}
/* HISTÓRICO CONGELADO: só se pode lançar/editar do mês atual para a frente */
let editHist=false; // desbloqueio temporário do histórico (volta a bloquear ao recarregar)
function nowYm(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function ymOf(year,mi){return year+'-'+String(mi+1).padStart(2,'0');}
function isPastMonth(year,mi){return ymOf(year,mi)<nowYm();}        // passado real (ignora desbloqueio)
function isFrozenYm(ym){return !editHist && ym<nowYm();}
function isFrozenMi(year,mi){return !editHist && isPastMonth(year,mi);}
/* ---- alertas & poupança (heurística sobre o histórico) ---- */
function mediana(arr){const s=arr.slice().sort((a,b)=>a-b);const n=s.length;return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0;}
function mesesDespesa(){return [...new Set(state.movimentos.filter(m=>m.tipo==='despesa').map(m=>m.data.slice(0,7)))].sort();}
function catMesTotal(catId,ym){const ids=[catId,...childrenOf(catId).map(c=>c.id)];return state.movimentos.filter(m=>m.tipo==='despesa'&&ids.includes(m.categoriaId)&&m.data.slice(0,7)===ym).reduce((a,m)=>a+m.valor,0);}
function catRangeTotal(catId,de,ate){const ids=[catId,...childrenOf(catId).map(c=>c.id)];return state.movimentos.filter(m=>m.tipo==='despesa'&&ids.includes(m.categoriaId)&&(!de||m.data>=de)&&(!ate||m.data<=ate)).reduce((a,m)=>a+m.valor,0);}
function computeAlertas(){
  const ms=mesesDespesa(); if(!ms.length)return {ref:null,acima:[],orc:[],out:[],superf:{mes:0,ano:0,cats:[]},total:0,n:0};
  const ref=ms[ms.length-1]; const prev=ms.filter(x=>x<ref).slice(-12); const yr=ref.slice(0,4);
  const acima=[],orc=[];
  topCats('despesa').forEach(c=>{
    const cur=round2(catMesTotal(c.id,ref));
    if(cur>0){ const hist=prev.map(m=>catMesTotal(c.id,m)).filter(v=>v>0); if(hist.length>=3){ const med=mediana(hist); if(med>0 && cur>med*1.4 && (cur-med)>=20){ acima.push({nome:c.nome,cor:c.cor,cur,med:round2(med),exc:round2(cur-med),pct:Math.round((cur-med)/med*100)}); } } }
    const lim=+state.orcamentos[c.id]||0; if(lim>0 && cur>lim){ orc.push({nome:c.nome,cor:c.cor,cur,lim,exc:round2(cur-lim),pct:Math.round((cur-lim)/lim*100)}); }
  });
  acima.sort((a,b)=>b.exc-a.exc); orc.sort((a,b)=>b.exc-a.exc);
  // outliers: movimentos individuais grandes no mês ref (vs mediana histórica da categoria)
  const out=[];
  state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,7)===ref).forEach(m=>{
    const hist=state.movimentos.filter(x=>x.tipo==='despesa'&&x.categoriaId===m.categoriaId&&x.data.slice(0,7)<ref).map(x=>x.valor);
    if(hist.length<4)return; const med=mediana(hist);
    if(med>0 && m.valor>=Math.max(med*3,100)){ out.push({nome:catName(m.categoriaId),valor:round2(m.valor),med:round2(med),data:m.data}); }
  });
  out.sort((a,b)=>b.valor-a.valor);
  // supérfluos (categorias marcadas + filhos)
  const superIds=[]; state.categorias.filter(c=>c.superfluo).forEach(c=>{superIds.push(c.id);childrenOf(c.id).forEach(k=>superIds.push(k.id));});
  const mesSup=round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,7)===ref&&superIds.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));
  const anoSup=round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,4)===yr&&superIds.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));
  const superfCats=state.categorias.filter(c=>c.superfluo&&!c.parent).map(c=>c.nome);
  return {ref,acima,orc,out:out.slice(0,5),superf:{mes:mesSup,ano:anoSup,cats:superfCats},total:round2(acima.reduce((a,x)=>a+x.exc,0)),n:acima.length+orc.length+out.length};
}

/* média ponderada (recente pesa mais) de uma série cronológica, removendo o outlier alto e baixo */
function _estPond(arr){
  arr=(arr||[]).filter(t=>t>0); if(!arr.length)return 0;
  let a=arr.slice();
  if(a.length>=5){ const s=a.slice().sort((x,y)=>x-y); const lo=s[0],hi=s[s.length-1]; let rl=false,rh=false; a=a.filter(v=>{if(!rl&&v===lo){rl=true;return false;}if(!rh&&v===hi){rh=true;return false;}return true;}); }
  let w=0,vs=0; a.forEach((v,i)=>{w+=i+1;vs+=v*(i+1);}); return round2(vs/w);
}
function mesesTipo(tipo){return [...new Set(state.movimentos.filter(m=>m.tipo===tipo).map(m=>m.data.slice(0,7)))].sort();}
/* estimativa do total de despesa do mês */
function estimativaMensal(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('despesa').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* estimativa da receita LÍQUIDA do mês (já com descontos SS/IRS, que são negativos) */
function estimativaReceitaLiq(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('receita').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* valor típico de uma fixa = mediana do que essa categoria gastou nos últimos meses (cai bem quando o valor varia) */
function medValorFixa(r){
  const hist=mesesDespesa().slice(-12).map(m=>catMesTotal(r.categoriaId,m)).filter(v=>v>0);
  return hist.length>=2?round2(mediana(hist)):round2(+r.valor||0);
}
/* Previsão de tesouraria do Valete (mês corrente): combina fixas com dia (âncoras) + gasto variável espalhado.
   Tudo estimado pelo histórico (mediana), porque dias e valores variam. */
function valeteForecast(){
  const v=valeteAtual();
  const d=new Date(); const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0'); const dim=new Date(Y,M+1,0).getDate();
  const estMensal=estimativaMensal(ymCur);
  // já SAIU = despesas deste mês que NÃO são pendentes (os agendados ainda não abateram)
  const gastoMes=round2(state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===ymCur&&!x.pendente).reduce((a,x)=>a+x.valor,0));
  // fixas ainda não pagas este mês e com dia >= hoje (âncoras futuras), valor estimado pelo histórico
  const launched=new Set(state.movimentos.filter(m=>m.recId&&m.data.slice(0,7)===ymCur).map(m=>m.recId));
  const fixas=state.recorrencias.filter(r=>r.ativo!==false&&!launched.has(r.id))
    .map(r=>({nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),valor:medValorFixa(r),dia:Math.min(dim,Math.max(1,+r.dia||8))}))
    .filter(f=>f.valor>0 && f.dia>=today);
  // débitos AGENDADOS (faturas com débito futuro): saída futura no dia certo, com VALOR EXATO
  const pendFut=state.movimentos.filter(m=>m.tipo==='despesa'&&m.pendente&&m.data.slice(0,7)===ymCur)
    .map(m=>({nome:catName(m.categoriaId),valor:Math.abs(m.valor),dia:Math.min(dim,Math.max(1,+m.data.slice(8,10))),exato:true}))
    .filter(f=>f.dia>=today);
  fixas.push(...pendFut); fixas.sort((a,b)=>a.dia-b.dia);
  const fixoFut=round2(fixas.reduce((a,f)=>a+f.valor,0));
  const varRest=Math.max(0,round2(estMensal-gastoMes-fixoFut));
  const diasRest=Math.max(1,dim-today+1); const varDia=varRest/diasRest;
  const need=round2(fixoFut+varRest); // total que ainda falta sair
  // RECEITA que ainda vai entrar este mês (líquida) e o dia em que entra
  const estReceita=estimativaReceitaLiq(ymCur);
  const recebidoMes=round2(state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===ymCur).reduce((a,x)=>a+x.valor,0));
  const restReceita=Math.max(0,round2(estReceita-recebidoMes));
  const diaSal=Math.min(28,Math.max(1,+state.settings.diaSalario||23));
  const diaChegada=restReceita>0?Math.max(today,diaSal):null; // se já passou, assume que entra hoje
  // curva de SALDO PROJETADO: Valete − despesas que saem + receita que entra, dia a dia
  const margem=Math.max(0,+state.settings.valeteMargem||0);
  const curva=[]; let accFix=0;
  for(let day=today;day<=dim;day++){
    accFix=round2(accFix+fixas.filter(f=>f.dia===day).reduce((a,f)=>a+f.valor,0));
    const out=round2(accFix+varDia*(day-today+1));
    const inflow=(diaChegada!=null&&day>=diaChegada)?restReceita:0;
    curva.push({day,saldo:(v==null?null:round2(v-out+inflow)),out,inflow});
  }
  let minSaldo=null,minDia=null,faltaDia=null,faltaValor=0;
  if(v!=null){ curva.forEach(c=>{ if(minSaldo==null||c.saldo<minSaldo){minSaldo=c.saldo;minDia=c.day;} if(faltaDia==null&&c.saldo<margem-0.001){faltaDia=c.day;faltaValor=round2(margem-c.saldo);} }); }
  return {v,margem,estMensal,gastoMes,fixas,fixoFut,varRest,need,estReceita,recebidoMes,restReceita,diaChegada,curva,minSaldo,minDia,faltaDia,faltaValor,today,dim,ok:(v==null?null:minSaldo>=margem-0.001)};
}
/* sparkline do saldo projetado do Valete ao longo do mês (com linhas da margem e do zero) */
function valeteSpark(F){
  if(!F.curva.length||F.v==null)return '';
  const w=300,h=64,pad=5;
  const vals=F.curva.map(c=>c.saldo).concat([F.v,F.margem,0]);
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const X=i=>pad+(F.curva.length<2?0:i/(F.curva.length-1))*(w-2*pad);
  const Yv=val=>h-pad-((val-min)/rng)*(h-2*pad);
  const pts=F.curva.map((c,i)=>`${X(i).toFixed(1)},${Yv(c.saldo).toFixed(1)}`).join(' ');
  const my=Yv(F.margem).toFixed(1);
  const fy=F.faltaDia!=null?X(F.curva.findIndex(c=>c.day===F.faltaDia)):null;
  const minIdx=F.curva.findIndex(c=>c.day===F.minDia);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;margin-top:6px">
    <line x1="${pad}" y1="${my}" x2="${w-pad}" y2="${my}" stroke="${F.margem>0?'var(--out)':'var(--mut)'}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="${pad}" y="${(+my-3)}" font-size="9" fill="${F.margem>0?'var(--out)':'var(--mut)'}">${F.margem>0?'margem':'0'}</text>
    <polyline points="${pts}" fill="none" stroke="${F.faltaDia!=null?'var(--out)':'var(--acc)'}" stroke-width="2"/>
    ${minIdx>=0?`<circle cx="${X(minIdx).toFixed(1)}" cy="${Yv(F.minSaldo).toFixed(1)}" r="3" fill="${F.faltaDia!=null?'var(--out)':'var(--acc)'}"/>`:''}
  </svg>`;
}

const DASH_CARDS=['insights','fluxo','orcamentos','transacoes','topcats','debitos','objetivo','alertas'];
const KPI_KEYS=['saldo','receitas','despesas','patrimonio'];
/* devolve a ordem guardada + chaves novas inseridas na sua posição default (não no fim) */
function orderArr(group){const all=group==='kpis'?KPI_KEYS:DASH_CARDS;const sk=group==='kpis'?'kpiOrder':'dashOrder';let o=(state.settings[sk]||[]).filter(k=>all.includes(k));all.forEach((k,idx)=>{if(o.includes(k))return;let pos=o.length;for(let j=idx-1;j>=0;j--){const p=o.indexOf(all[j]);if(p>=0){pos=p+1;break;}}o.splice(pos,0,k);});return o;}
function moveItem(group,key,dir){let o=orderArr(group);const i=o.indexOf(key);const j=i+dir;if(i<0||j<0||j>=o.length)return;[o[i],o[j]]=[o[j],o[i]];state.settings[group==='kpis'?'kpiOrder':'dashOrder']=o;save();render();}
function reorderDrop(group,fromKey,toKey){if(fromKey===toKey)return;let o=orderArr(group).filter(k=>k!==fromKey);const ti=o.indexOf(toKey);o.splice(ti<0?o.length:ti,0,fromKey);state.settings[group==='kpis'?'kpiOrder':'dashOrder']=o;save();render();}
/* mini-sparkline do saldo projetado do mês, para o herói */
function heroSpark(F){
  if(!F||F.v==null||!F.curva||F.curva.length<2)return '';
  const w=260,h=72,pad=3;
  const vals=F.curva.map(c=>c.saldo).concat([F.margem]);
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const X=i=>pad+(i/(F.curva.length-1))*(w-2*pad);
  const Y=v=>h-pad-((v-min)/rng)*(h-2*pad);
  const pts=F.curva.map((c,i)=>`${X(i).toFixed(1)},${Y(c.saldo).toFixed(1)}`).join(' ');
  const area=`${pad.toFixed(1)},${(h-pad).toFixed(1)} ${pts} ${(w-pad).toFixed(1)},${(h-pad).toFixed(1)}`;

/* donut de categorias (segmentos via stroke-dasharray) */
function donut(items,total){
  const r=42,C=2*Math.PI*r,cx=50,cy=50; let off=0;
  const segs=(items||[]).filter(it=>it.v>0).map(it=>{const len=(total>0?it.v/total:0)*C;const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.cor||'var(--acc)'}" stroke-width="13" stroke-linecap="butt" stroke-dasharray="${Math.max(0,len-0.6).toFixed(2)} ${(C-Math.max(0,len-0.6)).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=len;return s;}).join('');
  return `<svg viewBox="0 0 100 100" style="width:118px;height:118px"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--card2)" stroke-width="13"/>${segs}<text x="50" y="47" text-anchor="middle" font-size="6.5" fill="var(--mut)" style="text-transform:uppercase;letter-spacing:.5px">gasto</text><text x="50" y="59" text-anchor="middle" font-size="11" font-weight="800" fill="var(--txt)">${fmtK(total)} €</text></svg>`;
}
/* saudação conforme a hora */
function saudacao(){const h=new Date().getHours();return h<12?'Bom dia':(h<20?'Boa tarde':'Boa noite');}
/* anel de progresso (objetivo) */
function progRing(pct,size,col){
  const r=42,C=2*Math.PI*r,len=Math.max(0,Math.min(100,pct))/100*C,s=size||106;
  return `<svg viewBox="0 0 100 100" style="width:${s}px;height:${s}px"><circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--card2)" stroke-width="11"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="${col||'var(--acc)'}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" transform="rotate(-90 50 50)"/><text x="50" y="56" text-anchor="middle" font-size="17" font-weight="800" fill="var(--txt)">${Math.round(pct)}%</text></svg>`;
}
/* contadores animados (0→valor) — só quando o tab está visível */
function animateCounts(root){
  if(document.hidden)return;
  (root||document).querySelectorAll('[data-count]').forEach(el=>{
    const target=parseFloat(el.dataset.count); if(isNaN(target))return;
    const dur=600,t0=performance.now(),mode=el.dataset.cfmt;
    const fv=v=>mode==='eurn'?fmt(v):(mode==='eur'?fmt0(v):Math.round(v).toString());
    const step=t=>{const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);el.textContent=fv(target*e);if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  });
}

  /* período homólogo (mesmas datas, um ano antes) para comparação */
  const _sh=s=>(+s.slice(0,4)-1)+s.slice(4);

  const movsP=state.movimentos.filter(m=>m.data>=pde&&m.data<=pate);

  const cmpPct=(v,pv,goodUp)=>{if(!(pv>0))return '<span style="color:var(--mut)">—</span>';const pct=Math.round((v-pv)/pv*100);const good=(v>=pv)===goodUp;return `<b style="color:${pct===0?'var(--mut)':good?'var(--in)':'var(--out)'}">${pct>=0?'+':''}${pct}%</b>`;};
  const breakdown=(tipo)=>topCats(tipo).map(c=>{const ids=[c.id,...childrenOf(c.id).map(x=>x.id)];const v=round2(movs.filter(m=>m.tipo===tipo&&ids.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));const pv=round2(movsP.filter(m=>m.tipo===tipo&&ids.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));return {nome:c.nome,cor:c.cor,v,pv};}).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);

  <div class="body">
    <div class="top-range"><input type="date" id="relDe" value="${de}"><span style="color:var(--mut);font-size:12px">até</span><input type="date" id="relAte" value="${ate}"><span class="more" style="margin-left:auto">${movs.length} lançamento(s)</span></div>

    </div>
    <div class="hint" style="margin-bottom:14px">Período homólogo (${fmtData(pde)} – ${fmtData(pate)}): receitas <b>${fmt0(recP)}</b> ${cmpPct(rec,recP,true)} · despesas <b>${fmt0(despP)}</b> ${cmpPct(desp,despP,false)}</div>

function openCatDetail(catId,scopeMode){

  movs=movs.slice().sort((a,b)=>b.data.localeCompare(a.data));

  const prevMovs=state.movimentos.filter(m=>m.tipo==='despesa'&&ids.includes(m.categoriaId)&&(scopeMode==='mes'?m.data.slice(0,7)===ymOf(ano-1,miv):scopeMode==='range'?(m.data>=_sh(rde)&&m.data<=_sh(rate)):+m.data.slice(0,4)===ano-1));

  return ids;

/* Livro de acerto legado (sem UI no Nesto): histórico embebido + meses futuros das contas partilhadas. */
function acertoLedger(){
  const base=(state.acerto&&state.acerto.length?state.acerto:EMBED_ACERTO).map(r=>({ym:r.ym,deve:+r.deve||0,pago:+r.pago||0,fwd:false}));
  const lastYm=base.length?base[base.length-1].ym:'0000-00';
  // meses posteriores ao histórico: quota da outra pessoa = metade das despesas das contas partilhadas lançadas na app
  const acIds=acertoCatIds(); const fwd={};
  state.movimentos.filter(x=>x.tipo==='despesa'&&acIds.has(x.categoriaId)&&x.data.slice(0,7)>lastYm)
    .forEach(x=>{const ym=x.data.slice(0,7);fwd[ym]=(fwd[ym]||0)+x.valor/2;});
  Object.keys(fwd).sort().forEach(ym=>base.push({ym,deve:round2(fwd[ym]),pago:0,fwd:true}));
  let run=0; base.forEach(r=>{r.saldo=round2(r.deve-r.pago);run=round2(run+r.saldo);r.acc=run;});
  return base;
}

function saveConta(){

  const nome=val('mtcNome').trim()||'Conta'; const tipo=val('mtcTipo')||'ordem'; const taxa=Math.max(0,parseFloat(val('mtcTaxa'))||0);

function savePagamento(){

function delPagamento(dividaId,pagId){
  const d=(state.dividas||[]).find(x=>x.id===dividaId); if(!d)return;
  const p=(d.pagamentos||[]).find(x=>x.id===pagId); if(!p)return;
  if(p.movId){ const mv=state.movimentos.find(x=>x.id===p.movId); if(mv){ if(!isPastMonth(+mv.data.slice(0,4),+mv.data.slice(5,7)-1)) reverteValete(mv); state.movimentos=state.movimentos.filter(x=>x.id!==p.movId); } }
  d.pagamentos=d.pagamentos.filter(x=>x.id!==pagId); save(); render();
}
function delDivida(id){
  const d=(state.dividas||[]).find(x=>x.id===id); if(!d)return;
  if(!confirm('Apagar a dívida de '+(d.pessoa||'—')+'?'+((d.pagamentos&&d.pagamentos.some(p=>p.movId))?'\nOs pagamentos lançados na Grelha também serão removidos.':''))) return;
  (d.pagamentos||[]).forEach(p=>{ if(p.movId){ const mv=state.movimentos.find(x=>x.id===p.movId); if(mv){ if(!isPastMonth(+mv.data.slice(0,4),+mv.data.slice(5,7)-1)) reverteValete(mv); state.movimentos=state.movimentos.filter(x=>x.id!==p.movId); } } });
  state.dividas=state.dividas.filter(x=>x.id!==id); save(); render(); toast('Dívida apagada');
}

/* lê uma imagem, reduz a 128px (cover) e guarda como dataURL em state.settings.logo */
function processLogo(file,cb){
  if(!file)return; const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
    const S=128, c=document.createElement('canvas'); c.width=S;c.height=S; const g=c.getContext('2d');
    const r=Math.max(S/img.width,S/img.height), w=img.width*r, h=img.height*r;
    g.drawImage(img,(S-w)/2,(S-h)/2,w,h);
    state.settings.logo=c.toDataURL('image/png');
    if(cb)cb(); else { save(); render(); toast('Logo guardado'); }
  }; img.onerror=()=>toast('Imagem inválida'); img.src=e.target.result; };
  reader.readAsDataURL(file);
}

const round2=n=>Math.round((+n||0)*100)/100;

function poupApplyMov(y,i,delta,data,nota){
  const yp=state.poupancas[y]; const c=yp.contas[i];
  c.mov=c.mov||[]; c.mov.push({data,valor:delta,nota}); c.valor=round2((+c.valor||0)+delta);
  if(!c.real){
    const ri=yp.contas.findIndex(x=>x.real);
    if(ri>=0 && ri!==i){ const rc=yp.contas[ri]; rc.mov=rc.mov||[]; rc.mov.push({data,valor:-delta,nota:(delta>=0?'→ '+c.nome:'← '+c.nome)}); rc.valor=round2((+rc.valor||0)-delta); }
  }
}

function projetar(baseRec,baseDesp,patr0,o){
  const proj=[]; let patr=patr0; const rAnual=(o.reforco||0)*12;
  for(let k=1;k<=o.horizonte;k++){
    const rec=baseRec*Math.pow(1+o.gRec/100,k), desp=baseDesp*Math.pow(1+o.gDesp/100,k);
    let poup=rec-desp; if(rAnual>0) poup=Math.max(poup,rAnual);
    patr=patr*(1+o.juro/100)+poup; proj.push({ano:+o.baseAno+k,rec,desp,poup,patr});

  return proj;
}

  const anos=[...new Set(state.movimentos.map(x=>x.data.slice(0,4)))].sort();
  if(!anos.length)return '';
  const trAnos=anos.slice(-6);
  // A: receita vs despesa por ano (barras agrupadas)
  const maxA=Math.max(1,...trAnos.map(y=>Math.max(sumYearOf('receita',y),sumYearOf('despesa',y))));
  const Wa=320,Ha=160,baseA=Ha-20,topA=8,n=trAnos.length,slotA=Wa/n,bwA=Math.min(16,slotA/3.2);
  let barsA='';
  trAnos.forEach((y,i)=>{const cx=slotA*i+slotA/2;const r=sumYearOf('receita',y),d=sumYearOf('despesa',y);const hr=(r/maxA)*(baseA-topA),hd=(d/maxA)*(baseA-topA);
    barsA+=`<rect x="${(cx-bwA-1).toFixed(1)}" y="${(baseA-hr).toFixed(1)}" width="${bwA}" height="${Math.max(0,hr).toFixed(1)}" rx="2" fill="var(--in)"><title>${y} · receita ${fmt(r)}</title></rect>`;
    barsA+=`<rect x="${(cx+1).toFixed(1)}" y="${(baseA-hd).toFixed(1)}" width="${bwA}" height="${Math.max(0,hd).toFixed(1)}" rx="2" fill="var(--out)"><title>${y} · despesa ${fmt(d)}</title></rect>`;
    barsA+=`<text x="${cx.toFixed(1)}" y="${Ha-5}" text-anchor="middle" font-size="10" fill="var(--mut)">${y}</text>`;});
  // B: evolução mensal do ano selecionado (linhas receita/despesa)
  const sR=serieMensal('receita',ano),sD=serieMensal('despesa',ano);
  const maxB=Math.max(1,...sR,...sD);const Wb=320,Hb=160,baseB=Hb-20,topB=8,padBx=6;
  const xB=i=>padBx+i*((Wb-2*padBx)/11),yB=v=>baseB-(v/maxB)*(baseB-topB);
  const lineR=sR.map((v,i)=>`${xB(i).toFixed(1)},${yB(v).toFixed(1)}`).join(' ');
  const lineD=sD.map((v,i)=>`${xB(i).toFixed(1)},${yB(v).toFixed(1)}`).join(' ');

  const catTot=topCats('despesa').map(c=>({nome:c.nome,cor:c.cor,v:catAnoTotal(c.id,ano)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const maxC=Math.max(1,...catTot.map(c=>c.v));
  const barsC=catTot.map(c=>`<div style="display:flex;align-items:center;gap:8px;margin:5px 0">
      <span style="width:88px;font-size:12px;color:var(--mut);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.nome)}">${esc(c.nome)}</span>
      <div style="flex:1;background:var(--card2);border-radius:5px;height:14px;overflow:hidden"><div style="height:100%;width:${(c.v/maxC*100).toFixed(1)}%;background:${c.cor||'var(--acc)'};border-radius:5px"></div></div>
      <span style="width:64px;font-size:12px;text-align:right">${fmtK(c.v)} €</span></div>`).join('');
  return `<div class="card" style="margin-bottom:14px">
    <h2 style="border:0;padding:0;margin:0 0 12px;font-size:15px">${svg(I.trend)} Tendências</h2>
    <div class="cols-2">
      <div>
        <div style="font-size:12px;color:var(--mut);margin-bottom:4px;display:flex;gap:12px;align-items:center">Receita vs Despesa por ano <span style="margin-left:auto"><span style="display:inline-block;width:9px;height:9px;background:var(--in);border-radius:2px"></span> receita <span style="display:inline-block;width:9px;height:9px;background:var(--out);border-radius:2px;margin-left:6px"></span> despesa</span></div>
        <svg viewBox="0 0 ${Wa} ${Ha}" style="width:100%;height:160px">${barsA}</svg>
      </div>
      <div>
        <div style="font-size:12px;color:var(--mut);margin-bottom:4px">Mês a mês em ${ano} <span style="float:right"><span style="display:inline-block;width:9px;height:9px;background:var(--in);border-radius:2px"></span> receita <span style="display:inline-block;width:9px;height:9px;background:var(--out);border-radius:2px;margin-left:6px"></span> despesa</span></div>
        <svg viewBox="0 0 ${Wb} ${Hb}" style="width:100%;height:160px">
          <polyline points="${lineR}" fill="none" stroke="var(--in)" stroke-width="2"/>
          <polyline points="${lineD}" fill="none" stroke="var(--out)" stroke-width="2"/>
          ${sR.map((v,i)=>v>0?`<circle cx="${xB(i).toFixed(1)}" cy="${yB(v).toFixed(1)}" r="2" fill="var(--in)"/>`:'').join('')}
          ${sD.map((v,i)=>v>0?`<circle cx="${xB(i).toFixed(1)}" cy="${yB(v).toFixed(1)}" r="2" fill="var(--out)"/>`:'').join('')}
          ${axB}
        </svg>
      </div>
    </div>
    <div style="font-size:12px;color:var(--mut);margin:8px 0 2px">Para onde foi o dinheiro em ${ano} (top categorias)</div>
    ${barsC||'<div class="hint">Sem despesas registadas em '+ano+'.</div>'}
  </div>`;
}
function inflacaoHistorica(){const cy=new Date().getFullYear();const anos=[...new Set(state.movimentos.filter(m=>m.tipo==='despesa').map(m=>+m.data.slice(0,4)))].sort().filter(y=>y!==cy);const yo=[];for(let i=1;i<anos.length;i++){const a=sumYearOf('despesa',anos[i-1]),b=sumYearOf('despesa',anos[i]);if(a>0&&b>0)yo.push((b-a)/a*100);}return yo.length?round2(mediana(yo)):null;}

function catRow(c,child,lead,badge){return `<div class="catedit" style="${child?'padding-left:24px':''}">${child?'<span style="opacity:.4;margin-right:-2px">└</span>':(lead||'<span style="width:18px;display:inline-block;flex:none"></span>')}<button class="cicon ${c.icon&&CAT_ICONS[c.icon]?'':'dotcol'}" data-caticon="${c.id}" title="Escolher ícone e cor" style="width:28px;height:28px;background:${c.cor};color:#fff">${c.icon&&CAT_ICONS[c.icon]?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${CAT_ICONS[c.icon]}"/></svg>`:''}</button><input class="pinp" value="${esc(c.nome)}" data-catname="${c.id}">${badge||''}${!child?`<button class="iconbtn" data-newsub="${c.id}" title="Adicionar sub-categoria">${svg(I.plus)}</button>`:''}<button class="iconbtn" data-movecat="${c.id}" title="Mover / re-aninhar">${svg(I.move)}</button><button class="iconbtn" data-delcat="${c.id}">${svg(I.trash)}</button></div>`;}
function openCatIcon(catId){
  const c=cat(catId); if(!c)return; const cols=PALETTE.slice(0,8);
  document.getElementById('back').innerHTML=`<div class="modal"><h2>${svg(I.cat)} Ícone & cor<button class="close" data-close="1">&times;</button></h2>
  <div class="body">
    <div style="display:flex;align-items:center;gap:12px">${catIconHtml(c,46)}<div style="min-width:0"><div style="font-weight:700">${esc(c.nome)}</div><div class="dsub" style="margin:0">Escolhe a cor e um ícone.</div></div></div>
    <label style="margin-top:10px">Cor</label>
    <div class="metacols">${cols.map(col=>`<button type="button" class="metacol${c.cor===col?' on':''}" data-caticoncol="${catId}|${col}" style="background:${col}"></button>`).join('')}</div>
    <div class="setrow" style="margin-top:9px">
      <input type="color" id="catColPick" data-cat="${catId}" value="${/^#[0-9a-fA-F]{6}$/.test(c.cor||'')?c.cor:'#b7a99b'}" title="Roda de cores">
      <input type="text" id="catColHex" data-cat="${catId}" value="${esc(c.cor||'')}" maxlength="7" placeholder="#RRGGBB" style="max-width:118px">
      <span class="dsub" style="margin:0">roda de cores ou código #RRGGBB</span>
    </div>
    <label style="margin-top:12px">Ícone</label>
    <div class="iconpick"><button class="${!c.icon?'on':''}" data-caticonpick="${catId}|" title="Sem ícone (só cor)"><span class="cicon dotcol" style="width:15px;height:15px;background:${c.cor}"></span></button>${Object.keys(CAT_ICONS).map(k=>`<button class="${c.icon===k?'on':''}" data-caticonpick="${catId}|${k}" title="${k}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${CAT_ICONS[k]}"/></svg></button>`).join('')}</div>
  </div>
  <div class="foot"><div class="spacer"></div><button class="btn primary" data-close="1">${svg(I.check)}Concluir</button></div></div>`;
  openBack();
}
function catTree(tipo){return topCats(tipo).map(c=>{
  const kids=childrenOf(c.id); const open=defCatOpen.has(c.id);
  const lead = kids.length? `<button class="iconbtn" data-defcatopen="${c.id}" style="padding:2px;flex:none" title="${open?'Fechar':'Abrir'} (${kids.length})">${open?'▾':'▸'}</button>` : '<span style="width:18px;display:inline-block;flex:none"></span>';
  const badge = kids.length? `<span class="catcount" data-defcatopen="${c.id}" title="${open?'Fechar':'Abrir'} sub-categorias">${kids.length}</span>` : '';
  let h=catRow(c,false,lead,badge);
  if(open) h+=kids.map(k=>catRow(k,true)).join('');
  return h;
}).join('');}
